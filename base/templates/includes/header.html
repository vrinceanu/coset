{% load static %}

<!-- Header Section -->
    <header classs="shadow-sm">
        <div class="max-w-full mx-auto px-4 py-4">
            <div class="flex justify-around flex-wrap" >
                <!-- TSU Logo -->
                <div class="hidden lg:block">
                    <a href="https://www.tsu.edu">
                    <img src="{% static 'img/logo-tsu.svg' %}" alt="TSU Logo" class="h-20 w-auto">
                    </a>
                </div>                
                <!-- COSET Logo -->
                <div>
                    <a href="/">
                    <img src="{% static 'img/logo-coset.svg' %}" alt="COSET Logo" class="h-20 w-auto">
                    </a>
                </div>
                
                <!-- Search Block -->
                <div class="flex justify-center">
                  <div class="w-auto"> <!-- This container defines the shared width -->
    
                    <!-- Search Box Section -->
                    <div class="mb-4 mt-4">
                      <input type="text" placeholder="Search..." 
                         class="border bg-white w-full border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <!-- Links Section -->
                    <div class="flex justify-between items-center text-sm font-medium text-gray-700">
                      <a href="https://tigernet365.sharepoint.com/sites/MyTSU" class="px-2 hover:text-blue-600 transition duration-150">MyTSU</a>
                      <span class="text-gray-300">|</span>
                      <a href="https://tsu.instructure.com/" class="px-1 hover:text-blue-600 transition duration-150">Canvas</a>
                      <span class="text-gray-300">|</span>
                      <a href="https://www.office.com/login" class="px-1 hover:text-blue-600 transition duration-150">Office365</a>
                      <span class="text-gray-300">|</span>
                      <a href="/students/links" class="px-1 hover:text-blue-600 transition duration-150">For Students</a>
                      <span class="text-gray-300">|</span>
                      <a href="/about/links" class="px-1 hover:text-blue-600 transition duration-150">For Faculty</a>
                    </div>
                  </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Navigation -->
    <nav class="bg-maroon text-white sticky top-0 z-50">
        <div class="max-w-7xl mx-auto">
            <!-- Desktop Navigation -->
            <div id="desktop-nav" class="hidden md:flex">
                <!-- Generated dynamically -->
            </div>
            
            <!-- Mobile Navigation Toggle -->
            <div class="md:hidden flex justify-between items-center px-4 py-4">
                <span class="font-semibold text-lg">Menu</span>
                <button class="hamburger flex flex-col justify-center items-center w-8 h-8" onclick="toggleMobileMenu()">
                    <span class="block w-6 h-0.5 bg-white mb-1 transition-all duration-300"></span>
                    <span class="block w-6 h-0.5 bg-white mb-1 transition-all duration-300"></span>
                    <span class="block w-6 h-0.5 bg-white transition-all duration-300"></span>
                </button>
            </div>
        </div>
        <!-- Desktop Mega Menus Container -->
        <div id="megamenu-container">
            <!-- Generated dynamically -->
        </div>
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="overflow-hidden max-h-0 transition-all duration-300 ease-in-out bg-maroon md:hidden">
            <div id="mobile-nav" class="px-4 py-2">
                <!-- Generated dynamically -->
            </div>
        </div>
    </nav>
